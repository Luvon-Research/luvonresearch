# nginx.conf
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # serve existing files, or fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

    location /api/ {
    # proxy to your backend (using https or http internally)
    proxy_pass https://api.luvonai.com/api/;
    proxy_set_header Host $host;
    proxy_ssl_server_name on;
  }

  # you can add caching rules for asset types if you like
  location ~* \.(js|css|png|svg|ico|json)$ {
    expires 1y;
    add_header Cache-Control "public";
  }
}